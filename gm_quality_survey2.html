<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Quality — 판단 배경 서베이</title>
<style>
:root {
  --black: #0A0A0A;
  --white: #FFFFFF;
  --gray-50: #F7F7F5;
  --gray-100: #EDEDEB;
  --gray-200: #D6D6D2;
  --gray-400: #9A9A94;
  --gray-600: #5C5C58;
  --gray-800: #2A2A28;
  --red: #D93B2B;
  --red-bg: rgba(217,59,43,0.12);
  --orange: #D97B2B;
  --orange-bg: rgba(217,123,43,0.12);
  --blue: #2B6ED9;
  --blue-bg: rgba(43,110,217,0.12);
  --green: #2BA85C;
  --green-bg: rgba(43,168,92,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

/* Name screen */
.name-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; max-width: 480px; margin: 0 auto; width: 100%; }
.brand-label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--gray-400); text-transform: uppercase; margin-bottom: 32px; }
.name-screen h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
.name-screen p { font-size: 14px; color: var(--gray-400); margin-bottom: 32px; line-height: 1.6; }
.name-input { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid var(--gray-600); background: var(--gray-800); color: var(--white); font-size: 16px; margin-bottom: 16px; outline: none; transition: border-color 0.15s; }
.name-input:focus { border-color: var(--white); }
.start-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--white); color: var(--black); font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; }
.start-btn:hover { opacity: 0.85; }

/* Survey screen */
.survey-wrap { flex: 1; display: flex; flex-direction: column; max-width: 560px; margin: 0 auto; width: 100%; padding: 0 0 40px; }

.survey-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.survey-brand { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: var(--gray-400); text-transform: uppercase; }
.survey-progress-text { font-size: 11px; color: var(--gray-400); }

.progress-wrap { padding: 0 24px 20px; }
.progress-track { height: 2px; background: var(--gray-800); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--white); border-radius: 2px; transition: width 0.4s ease; }

.case-block { margin: 0 24px 16px; background: var(--gray-800); border-radius: 16px; padding: 20px; }
.case-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.case-num-tag { font-size: 11px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.08em; }
.type-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.case-text { font-size: 15px; line-height: 1.7; color: var(--white); margin-bottom: 14px; }
.prev-judgment { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

/* Reason block */
.reason-block { margin: 0 24px 16px; }
.reason-title { font-size: 12px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }
.reason-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.reason-option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--gray-800); background: var(--gray-800); cursor: pointer; transition: all 0.15s; }
.reason-option:hover { border-color: var(--gray-600); }
.reason-option.selected { border-color: var(--white); background: rgba(255,255,255,0.06); }
.reason-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--gray-600); background: transparent; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.reason-option.selected .reason-checkbox { background: var(--white); border-color: var(--white); }
.reason-checkbox-inner { width: 10px; height: 10px; background: var(--black); border-radius: 2px; display: none; }
.reason-option.selected .reason-checkbox-inner { display: block; }
.reason-label { font-size: 14px; color: var(--white); line-height: 1.5; }

.reason-other-wrap { margin-top: 4px; }
.reason-other-label { font-size: 12px; color: var(--gray-400); margin-bottom: 6px; }
.reason-other-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid var(--gray-800); background: var(--gray-800); color: var(--white); font-size: 14px; outline: none; resize: none; transition: border-color 0.15s; min-height: 72px; }
.reason-other-input:focus { border-color: var(--gray-600); }
.reason-other-input::placeholder { color: var(--gray-600); }

.nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 24px; }
.nav-btn { padding: 14px; border-radius: 12px; border: 1.5px solid var(--gray-800); background: var(--gray-800); color: var(--white); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.nav-btn:hover { border-color: var(--gray-600); }
.nav-btn.primary { background: var(--white); color: var(--black); border-color: var(--white); }
.nav-btn.primary:hover { opacity: 0.85; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Complete screen */
.complete-screen { flex: 1; display: flex; flex-direction: column; padding: 32px 24px; max-width: 560px; margin: 0 auto; width: 100%; }
.complete-header { text-align: center; margin-bottom: 32px; }
.complete-icon { font-size: 40px; margin-bottom: 16px; }
.complete-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.complete-header p { font-size: 13px; color: var(--gray-400); line-height: 1.6; }

.result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.result-item { background: var(--gray-800); border-radius: 12px; padding: 14px 16px; }
.result-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.result-case-num { font-size: 11px; font-weight: 600; color: var(--gray-400); }
.result-judgment { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.result-case-text { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; line-height: 1.4; }
.result-reasons { display: flex; flex-wrap: wrap; gap: 6px; }
.result-reason-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.08); color: var(--gray-400); border: 1px solid rgba(255,255,255,0.1); }
.result-other { font-size: 12px; color: var(--gray-400); font-style: italic; margin-top: 4px; }

.screenshot-note { text-align: center; font-size: 12px; color: var(--gray-600); padding: 16px; background: var(--gray-800); border-radius: 12px; }

.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }
</style>
</head>
<body>

<div id="screen-name" class="screen active">
  <div class="name-screen">
    <div class="brand-label">GM Quality</div>
    <h1>판단 배경 서베이</h1>
    <p>1차 게임에서의 판단 배경을<br>각 케이스별로 알려주세요.</p>
    <div style="background:var(--gray-800);border-radius:12px;padding:14px 16px;margin-bottom:20px;text-align:left">
      <div style="font-size:11px;font-weight:600;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">📸 시작 전 준비</div>
      <div style="font-size:13px;color:var(--white);line-height:1.6">1차 게임 결과 스크린샷을 옆에 준비해주세요.<br>각 케이스 판단 결과를 참고하며 배경을 선택합니다.</div>
    </div>
    <input class="name-input" id="name-input" type="text" placeholder="이름을 입력해주세요 (1차와 동일하게)" maxlength="20" />
    <button class="start-btn" onclick="startSurvey()">시작하기</button>
  </div>
</div>

<div id="screen-survey" class="screen">
  <div class="survey-wrap">
    <div class="survey-header">
      <div class="survey-brand">GM Quality</div>
      <div class="survey-progress-text" id="prog-text">1 / 27</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="case-block">
      <div class="case-meta">
        <span class="case-num-tag" id="case-num-tag">CASE 01</span>
        <span class="type-badge" id="type-badge"></span>
      </div>
      <div class="case-text" id="case-text"></div>
      <div>
        <span class="prev-judgment" id="prev-judgment"></span>
      </div>
    </div>
    <div class="reason-block">
      <div class="reason-title">이 판단의 배경은? (복수 선택 가능)</div>
      <div class="reason-options" id="reason-options"></div>
      <div class="reason-other-wrap">
        <div class="reason-other-label">위 항목에 해당하지 않는다면 직접 입력해주세요</div>
        <textarea class="reason-other-input" id="reason-other" placeholder="판단 배경을 직접 입력해주세요..."></textarea>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="prevCase()">← 이전</button>
      <button class="nav-btn primary" id="btn-next" onclick="nextCase()">다음 →</button>
    </div>
  </div>
</div>

<div id="screen-complete" class="screen">
  <div class="complete-screen">
    <div class="complete-header">
      <div class="complete-icon">✓</div>
      <h2 id="complete-title"></h2>
      <p>서베이가 완료됐습니다.<br>아래 결과를 스크린샷 찍어서 주최자에게 전달해주세요.</p>
    </div>
    <div class="result-list" id="result-list"></div>
    <div class="screenshot-note">📸 스크린샷을 찍어서 주최자에게 전달해주세요.</div>
  </div>
</div>

<script>

const subLabels = { 'always':'항상 불가능', 'cond-no':'조건부 불가능', 'cond-yes':'조건부 허용', 'full-yes':'완전 허용' };

const subBgs = { 'always':'var(--red-bg)', 'cond-no':'var(--orange-bg)', 'cond-yes':'var(--blue-bg)', 'full-yes':'var(--green-bg)' };

let cur = 0;
let userName = '';
let answers = []; // {caseNum, selectedReasons[], otherText}
let prevJudgments = {}; // caseNum -> sub (from 1st game, input by user)

function startSurvey() {
  const input = document.getElementById('name-input').value.trim();
  if (!input) { document.getElementById('name-input').focus(); return; }
  userName = input;

  // Initialize answers
  answers = cases.map(c => ({ caseNum: c.num, selectedReasons: [], otherText: '' }));

  showScreen('screen-survey');
  render();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function render() {
  const c = cases[cur];
  const pct = Math.round((cur / cases.length) * 100);
  document.getElementById('prog-text').textContent = (cur + 1) + ' / ' + cases.length;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('case-num-tag').textContent = 'CASE ' + String(c.num).padStart(2, '0');
  document.getElementById('case-text').textContent = c.text;

  const tc = typeColors[c.type] || { bg: '#F1EFE8', color: '#5F5E5A' };
  const tb = document.getElementById('type-badge');
  tb.textContent = c.type;
  tb.style.background = tc.bg;
  tb.style.color = tc.color;

  // Prev judgment (placeholder — user can see their own result)
  const pj = document.getElementById('prev-judgment');
  const sub = prevJudgments[c.num] || null;
  if (sub) {
    pj.textContent = '1차 판단: ' + subLabels[sub];
    pj.style.background = subBgs[sub];
    pj.style.color = subColors[sub];
  } else {
    pj.textContent = '1차 게임 결과를 참고해주세요';
    pj.style.background = 'rgba(255,255,255,0.06)';
    pj.style.color = 'var(--gray-400)';
  }

  // Reason options
  const optionsEl = document.getElementById('reason-options');
  optionsEl.innerHTML = '';
  const currentAnswer = answers[cur];

  reasonOptions.forEach(opt => {
    const div = document.createElement('div');
    const isSelected = currentAnswer.selectedReasons.includes(opt);
    div.className = 'reason-option' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <div class="reason-checkbox"><div class="reason-checkbox-inner"></div></div>
      <div class="reason-label">${opt}</div>
    `;
    div.addEventListener('click', () => {
      const idx = currentAnswer.selectedReasons.indexOf(opt);
      if (idx > -1) currentAnswer.selectedReasons.splice(idx, 1);
      else currentAnswer.selectedReasons.push(opt);
      render();
    });
    optionsEl.appendChild(div);
  });

  // Other text
  const otherInput = document.getElementById('reason-other');
  otherInput.value = currentAnswer.otherText;
  otherInput.oninput = () => { currentAnswer.otherText = otherInput.value; };

  // Prev button
  document.getElementById('btn-prev').disabled = cur === 0;

  // Next button text
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = cur === cases.length - 1 ? '완료' : '다음 →';
}

function nextCase() {
  if (cur < cases.length - 1) {
    cur++;
    render();
    window.scrollTo(0, 0);
  } else {
    showComplete();
  }
}

function prevCase() {
  if (cur > 0) {
    cur--;
    render();
    window.scrollTo(0, 0);
  }
}

async function saveToSheets(name, allAnswers) {
  try {
    const payload = {
      name: name,
      answers: allAnswers.map(a => {
        const c = cases.find(c => c.num === a.caseNum);
        return {
          caseNum: a.caseNum,
          type: c ? c.type : '',
          reasons: a.selectedReasons,
          other: a.otherText || ''
        };
      })
    };
    await fetch('https://script.google.com/macros/s/AKfycbzmuHzlt-vzB5NbRhFjZhPuwQsY15Ztvel3EPNLOHo9Xf2nRhoeACgNulA3uoyjI0BX/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    console.error('저장 실패:', e);
  }
}

function showComplete() {
  showScreen('screen-complete');
  document.getElementById('complete-title').textContent = userName + '님의 서베이 결과';

  // Save to Google Sheets — 전체를 1개 요청으로 전송
  saveToSheets(userName, answers);

  const list = document.getElementById('result-list');
  list.innerHTML = '';

  answers.forEach(a => {
    const c = cases.find(c => c.num === a.caseNum);
    if (!c) return;
    const hasResponse = a.selectedReasons.length > 0 || a.otherText.trim();
    if (!hasResponse) return;

    const tc = typeColors[c.type] || { bg: '#F1EFE8', color: '#5F5E5A' };
    const div = document.createElement('div');
    div.className = 'result-item';

    const tagsHtml = a.selectedReasons.map(r =>
      `<span class="result-reason-tag">${r}</span>`
    ).join('');

    const otherHtml = a.otherText.trim()
      ? `<div class="result-other">"${a.otherText.trim()}"</div>` : '';

    div.innerHTML = `
      <div class="result-item-header">
        <span class="result-case-num">케이스 ${String(a.caseNum).padStart(2,'0')}</span>
        <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${tc.bg};color:${tc.color}">${c.type}</span>
      </div>
      <div class="result-case-text">${c.text}</div>
      <div class="result-reasons">${tagsHtml}</div>
      ${otherHtml}
    `;
    list.appendChild(div);
  });

  if (list.children.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--gray-400);font-size:14px">응답한 케이스가 없습니다.</div>';
  }
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startSurvey();
});
</script>
